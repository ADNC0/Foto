{% extends "plantilla.html" %}

{% block body %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="text-center mb-4">Editar Selección de Cliente</h2>
            
            <form action="{% url 'procesoActualizarSeleccion' %}" method="post" id="frm_editar_seleccion">
                {% csrf_token %}
                
                <input type="hidden" name="id" value="{{ seleccionEditar.id }}">
                
                <div class="form-group mb-3">
                    <label for="cliente" class="form-label">Cliente:</label>
                    <select name="cliente" id="cliente" class="form-control" required>
                        <option value="">--Seleccione un cliente--</option>
                        {% for cliente in clientes %}
                        <option value="{{ cliente.id }}"
                                {% if seleccionEditar.cliente.id == cliente.id %}selected{% endif %}>
                            {{ cliente.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="invalid-feedback" id="cliente-error"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="email_cliente" class="form-label">Correo electrónico del cliente:</label>
                    <input type="email" name="email_cliente" class="form-control" id="email_cliente" 
                           value="{{ seleccionEditar.email_cliente }}"
                           placeholder="Ingrese el correo electrónico" required>
                    <div class="invalid-feedback" id="email_cliente-error"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="estado" class="form-label">Estado de la selección:</label>
                    <select name="estado" id="estado" class="form-control" required>
                        <option value="">--Seleccione un estado--</option>
                        <option value="PENDIENTE" 
                                {% if seleccionEditar.estado == 'PENDIENTE' %}selected{% endif %}>
                            Pendiente de envío
                        </option>
                        <option value="ENVIADO" 
                                {% if seleccionEditar.estado == 'ENVIADO' %}selected{% endif %}>
                            Enviado correctamente
                        </option>
                        <option value="CANCELADO" 
                                {% if seleccionEditar.estado == 'CANCELADO' %}selected{% endif %}>
                            Cancelado por cliente
                        </option>
                    </select>
                    <div class="invalid-feedback" id="estado-error"></div>
                </div>

                <div class="form-group mb-3">
                    <label for="notas_cancelacion" class="form-label">Notas de cancelación (si aplica):</label>
                    <textarea name="notas_cancelacion" id="notas_cancelacion" 
                              class="form-control" rows="3" 
                              placeholder="Notas sobre la cancelación o cualquier observación importante">{{ seleccionEditar.notas_cancelacion|default:'' }}</textarea>
                    <small class="form-text text-muted">
                        Usa este campo para notas importantes, especialmente si el estado es "Cancelado"
                    </small>
                </div>

                <div class="text-center">
                    <button type="submit" class="btn btn-warning">
                        Actualizar Selección
                    </button>
                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                    <a href="{% url 'listado_selecciones' %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.error-message{
    color:red;
    font-size:14px;
    margin-top:5px;
}

input.error, select.error{
    border:1px solid red;
}
</style>

<script>
$("#frm_editar_seleccion").validate({
    rules:{
        cliente:{required:true},
        email_cliente:{required:true,email:true},
        estado:{required:true}
    },
    messages:{
        cliente:{
            required:"Debe seleccionar un cliente"
        },
        email_cliente:{
            required:"El correo electrónico es obligatorio",
            email:"Ingrese un correo válido"
        },
        estado:{
            required:"Debe seleccionar un estado"
        }
    },
    errorClass:"error-message",
    errorElement:"div",
    errorPlacement: function(error, element) {
        error.appendTo(element.siblings(".invalid-feedback"));
    },
    highlight:function(element){
        $(element).addClass("error");
        $(element).siblings(".invalid-feedback").show();
    },
    unhighlight:function(element){
        $(element).removeClass("error");
        $(element).siblings(".invalid-feedback").hide();
    }
});
</script>

{% endblock %}
