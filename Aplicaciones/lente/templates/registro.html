<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Crear cuenta</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    height:100vh;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
}

.login-box{
    width:400px;
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.4);
}

.login-title{
    text-align:center;
    margin-bottom:30px;
    font-weight:bold;
    font-size:28px;
}

.btn-login{
    width:100%;
    background:#2c5364;
    border:none;
}

.btn-login:hover{
    background:#1e3a47;
}

.link{
    text-align:center;
    margin-top:20px;
}

.link a{
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="login-box">

<div class="login-title">
📷 Crear cuenta
</div>

<form method="POST">
{% csrf_token %}

<div class="mb-3">

<label class="form-label">Nombre</label>
<input type="text" name="nombre" class="form-control" placeholder="Alsajer" required>

</div>

<div class="mb-3">

<label class="form-label">Correo</label>
<input type="email" name="email" class="form-control" placeholder="ejemplo@gmail.com" required>

</div>

<div class="mb-3">

<label class="form-label">Contraseña</label>
<input type="password" name="password" class="form-control" placeholder="********" required>

</div>

<button type="submit" class="btn btn-login text-white">
Crear cuenta
</button>

</form>
<div class="link">

<a href="{% url 'login' %}">
Volver al login
</a>

</div>

</div>

</body>
</html>
